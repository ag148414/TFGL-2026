<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TFGL – The Fantasy Golf League</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Sans+3:wght@300;400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --navy:     #0C447C;
  --navy-dark:#082f57;
  --navy-mid: #1a5a9e;
  --blue-lt:  #B5D4F4;
  --gold:     #EF9F27;
  --gold-lt:  #f7c96e;
  --green:    #1D9E75;
  --green-dk: #0F6E56;
  --white:    #FFFFFF;
  --off-white:#F4F7FB;
  --gray-lt:  #E8EEF6;
  --gray-mid: #9EB4CC;
  --gray-dk:  #4a6280;
  --text:     #0d1f33;
  --red:      #d94444;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Source Sans 3', sans-serif;
  background: var(--off-white);
  color: var(--text);
  min-height: 100vh;
}

/* ── HEADER ── */
header {
  background: var(--navy);
  padding: 0 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: 0 2px 12px rgba(8,47,87,0.4);
  position: sticky;
  top: 0;
  z-index: 100;
}
.logo-wrap {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 10px 0;
  cursor: pointer;
}
.logo-text .wordmark {
  font-family: 'Playfair Display', serif;
  font-size: 26px;
  font-weight: 900;
  color: var(--white);
  letter-spacing: -0.5px;
}
.logo-text .sub {
  font-size: 9px;
  font-weight: 600;
  color: var(--blue-lt);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-top: 2px;
}

/* ── NAV ── */
nav { display: flex; gap: 4px; }
nav button {
  background: none;
  border: none;
  color: var(--blue-lt);
  font-family: 'Source Sans 3', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 20px 18px;
  cursor: pointer;
  border-bottom: 3px solid transparent;
  transition: color .2s, border-color .2s;
}
nav button:hover { color: var(--white); }
nav button.active { color: var(--gold); border-bottom-color: var(--gold); }

/* ── TABS ── */
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ── COMMON ── */
.section-header {
  background: linear-gradient(135deg, var(--navy-dark) 0%, var(--navy) 100%);
  padding: 28px 32px;
  display: flex;
  align-items: center;
  gap: 14px;
}
.section-header h1 {
  font-family: 'Playfair Display', serif;
  font-size: 28px;
  color: var(--white);
  font-weight: 700;
}
.badge {
  font-size: 9px;
  font-weight: 800;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 4px 10px;
  border-radius: 20px;
}
.badge.live { background: var(--red); color: #fff; animation: pulse 2s infinite; }
.badge.final { background: var(--gray-dk); color: #fff; }
.badge.upcoming { background: var(--green); color: #fff; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.6} }

.card {
  background: var(--white);
  border-radius: 12px;
  box-shadow: 0 2px 12px rgba(12,68,124,.08);
  margin: 20px 24px;
  overflow: hidden;
}
.loader {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 20px;
  gap: 16px;
  color: var(--gray-dk);
  font-size: 14px;
}
.spinner {
  width: 36px;
  height: 36px;
  border: 3px solid var(--gray-lt);
  border-top-color: var(--navy);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── STANDINGS STRIP ── */
.standings-strip {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 10px;
  padding: 16px 24px;
  background: var(--white);
  border-bottom: 1px solid var(--gray-lt);
}
.ss-card {
  background: var(--off-white);
  border-radius: 8px;
  padding: 10px 12px;
  text-align: center;
}
.ss-card.rank-1 { background: linear-gradient(135deg,#fff8ee,#fff3d6); border: 1px solid var(--gold-lt); }
.ss-rank { font-size: 10px; font-weight: 700; color: var(--gray-dk); letter-spacing: 1px; margin-bottom: 2px; }
.ss-owner { font-size: 12px; font-weight: 700; color: var(--navy); }
.ss-pts { font-family: 'DM Mono', monospace; font-size: 15px; font-weight: 500; color: var(--green-dk); }

/* ── TOURNAMENT BANNER ── */
.tournament-banner {
  background: linear-gradient(90deg, var(--navy) 0%, var(--navy-mid) 100%);
  padding: 14px 20px;
  color: var(--white);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 8px;
}
.t-name { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; }
.t-meta { font-size: 12px; color: var(--blue-lt); }

/* ── LEADERBOARD TABLE ── */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
thead { background: var(--gray-lt); }
thead th {
  padding: 10px 14px;
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: var(--gray-dk);
  text-align: left;
  white-space: nowrap;
}
thead th.c { text-align: center; }
tbody tr { border-bottom: 1px solid var(--gray-lt); transition: background .15s; }
tbody tr:hover { background: var(--off-white); }
tbody tr.pool-player { background: rgba(29,158,117,.06); }
tbody tr.pool-player:hover { background: rgba(29,158,117,.12); }
tbody td {
  padding: 10px 14px;
  font-size: 13px;
  white-space: nowrap;
}
tbody td.c { text-align: center; }
.pos-cell { font-family: 'DM Mono', monospace; font-weight: 500; color: var(--gray-dk); font-size: 12px; }
.player-name { font-weight: 600; color: var(--text); }
.player-name.pool { color: var(--navy); }
.team-pill {
  display: inline-block;
  font-size: 10px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 10px;
  background: var(--navy);
  color: var(--white);
  letter-spacing: .5px;
  white-space: nowrap;
}
.score-cell { font-family: 'DM Mono', monospace; font-size: 13px; }
.score-cell.under { color: var(--red); font-weight: 700; }
.score-cell.over  { color: var(--navy); }
.score-cell.even  { color: var(--gray-dk); }
.cut-row td { opacity: .5; }
.last-upd { padding: 10px 16px; font-size: 11px; color: var(--gray-mid); border-top: 1px solid var(--gray-lt); }

/* ── TEAMS TAB ── */
.teams-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  padding: 20px 24px;
}
.team-card {
  background: var(--white);
  border-radius: 12px;
  box-shadow: 0 2px 12px rgba(12,68,124,.08);
  overflow: hidden;
}
.team-header {
  background: linear-gradient(135deg, var(--navy-dark), var(--navy));
  padding: 14px 18px;
}
.team-owner { font-family: 'Playfair Display', serif; font-size: 16px; color: var(--white); font-weight: 700; }
.team-earnings { font-size: 12px; color: var(--blue-lt); margin-top: 2px; }
.team-players { list-style: none; }
.team-players li {
  padding: 9px 18px;
  font-size: 13px;
  border-bottom: 1px solid var(--gray-lt);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.team-players li:last-child { border-bottom: none; }
.player-earn { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--green-dk); font-weight: 500; }

/* ── RESPONSIVE ── */
@media(max-width:1000px){ .teams-grid { grid-template-columns: repeat(2,1fr); } }
@media(max-width:700px){
  .teams-grid { grid-template-columns: 1fr; }
  .standings-strip { grid-template-columns: repeat(3,1fr); }
  nav button { padding: 16px 10px; font-size: 10px; }
  .logo-text .sub { display: none; }
}
</style>
</head>
<body>

<header>
  <div class="logo-wrap" onclick="showTab('live')">
    <svg width="36" height="36" viewBox="0 0 36 36">
      <line x1="18" y1="6" x2="18" y2="28" stroke="#B5D4F4" stroke-width="2" stroke-linecap="round"/>
      <polygon points="18,6 28,11 18,16" fill="#EF9F27"/>
      <ellipse cx="18" cy="29" rx="8" ry="3" fill="#0F6E56"/>
      <ellipse cx="18" cy="28" rx="8" ry="3" fill="#1D9E75"/>
    </svg>
    <div class="logo-text">
      <div class="wordmark">TFGL</div>
      <div class="sub">The Fantasy Golf League</div>
    </div>
  </div>
  <nav>
    <button onclick="showTab('live')"  id="nav-live"  class="active">Live Scoring</button>
    <button onclick="showTab('teams')" id="nav-teams">Teams</button>
  </nav>
</header>

<main>

<!-- ── LIVE SCORING ── -->
<div id="tab-live" class="tab-panel active">
  <div class="section-header">
    <h1>Live Scoring</h1>
    <span class="badge live" id="live-badge">LIVE</span>
  </div>
  <div id="standings-strip" class="standings-strip"></div>
  <div class="card">
    <div id="live-loading" class="loader"><div class="spinner"></div><p>Loading tournament data…</p></div>
    <div id="live-content" style="display:none">
      <div class="tournament-banner" id="tournament-banner"></div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th class="c">POS</th><th>PLAYER</th><th>TEAM</th>
            <th class="c">TOT</th><th class="c">R1</th><th class="c">R2</th><th class="c">R3</th><th class="c">R4</th><th class="c">THRU</th>
          </tr></thead>
          <tbody id="scoring-tbody"></tbody>
        </table>
      </div>
      <div class="last-upd" id="last-upd"></div>
    </div>
    <div id="live-error" class="loader" style="display:none"><p>⚠️ Could not load live data. Check back shortly.</p></div>
  </div>
</div>

<!-- ── TEAMS ── -->
<div id="tab-teams" class="tab-panel">
  <div class="section-header"><h1>Team Rosters</h1></div>
  <div id="teams-loading" class="card"><div class="loader"><div class="spinner"></div><p>Loading rosters…</p></div></div>
  <div id="teams-grid" class="teams-grid" style="display:none"></div>
  <div id="teams-error" class="card" style="display:none"><div class="loader"><p>⚠️ Could not load roster data.</p></div></div>
</div>

</main>

<script>
const WORKER   = 'https://tfgl2026.ag148414.workers.dev';
const JSONBIN  = 'https://api.jsonbin.io/v3/b/69dc46c9856a68218928fe66';
const JSONBIN_KEY = '$2a$10$O5Eqd7eiCEPjb5y5HNK8meG3PGVoHxz.tIbCHO7vKRqrMaQjXFJJC';

/* ─── tab switching ──────────────────────────── */
function showTab(name) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  document.getElementById('nav-' + name).classList.add('active');
}

/* ─── data cache ─────────────────────────────── */
let rosters    = null;  // [{owner, players:[]}]
let earningsMap = {};   // playerName → earnings (number)

/* ─── score formatting ───────────────────────── */
function fmtScore(val) {
  if (!val || val === '–' || val === 'E') return { txt: val || 'E', cls: 'even' };
  const n = parseInt(val, 10);
  if (isNaN(n)) return { txt: val, cls: 'even' };
  if (n < 0)  return { txt: String(n), cls: 'under' };
  if (n === 0) return { txt: 'E', cls: 'even' };
  return { txt: '+' + n, cls: 'over' };
}

/* ─── find which team owns a player ──────────── */
function ownerOf(playerName) {
  if (!rosters || !playerName) return null;
  const norm = n => n.toLowerCase().replace(/[^a-z]/g,'');
  const pn = norm(playerName);
  for (const t of rosters) {
    for (const p of t.players) {
      if (norm(p) === pn) return t.owner.split(' ')[0]; // first name only
    }
  }
  return null;
}

/* ─── STANDINGS STRIP ────────────────────────── */
function buildStandings() {
  const strip = document.getElementById('standings-strip');
  if (!rosters) { strip.innerHTML = ''; return; }
  const totals = rosters.map(t => {
    const pts = t.players.reduce((sum, p) => {
      const earn = earningsMap[p] || 0;
      return sum + earn / 100000;
    }, 0);
    return { owner: t.owner, pts };
  }).sort((a,b) => b.pts - a.pts);

  strip.innerHTML = totals.map((t, i) => `
    <div class="ss-card${i===0?' rank-1':''}">
      <div class="ss-rank">#${i+1}</div>
      <div class="ss-owner">${t.owner.split(' ')[0]}</div>
      <div class="ss-pts">${t.pts.toFixed(1)} pts</div>
    </div>`).join('');
}

/* ─── LOAD ROSTERS ───────────────────────────── */
async function loadRosters() {
  try {
    const res = await fetch(JSONBIN, { headers: { 'X-Master-Key': JSONBIN_KEY } });
    const json = await res.json();
    rosters = json.record.teams;
  } catch(e) {
    console.warn('Roster load failed', e);
    rosters = [];
  }
}

/* ─── LOAD EARNINGS ──────────────────────────── */
async function loadEarnings() {
  try {
    const res = await fetch(`${WORKER}?type=earnings`);
    const json = await res.json();
    earningsMap = {};
    (json.players || []).forEach(p => {
      if (p.name && p.earnings != null) earningsMap[p.name] = p.earnings;
    });
  } catch(e) {
    console.warn('Earnings load failed', e);
  }
}

/* ─── LOAD LIVE SCORING ──────────────────────── */
async function loadLive() {
  const loading = document.getElementById('live-loading');
  const content = document.getElementById('live-content');
  const errEl   = document.getElementById('live-error');
  const badge   = document.getElementById('live-badge');

  try {
    const res  = await fetch(`${WORKER}?type=schedule`);
    const data = await res.json();

    // find current/most-recent event
    const events = data.events || [];
    const now = new Date();
    let current = null;
    for (const ev of events) {
      const end = new Date(ev.endDate || ev.date);
      if (end >= now || !current) current = ev;
      if (new Date(ev.startDate || ev.date) <= now && end >= now) { current = ev; break; }
    }
    if (!current) throw new Error('No event found');

    const lbRes  = await fetch(`${WORKER}?type=leaderboard&id=${current.id}`);
    const lbData = await lbRes.json();

    // status badge
    const st = (lbData.status || '').toLowerCase();
    badge.className = 'badge ' + (st.includes('in') ? 'live' : st.includes('final') || st.includes('complete') ? 'final' : 'upcoming');
    badge.textContent = st.includes('in') ? 'LIVE' : st.includes('final') || st.includes('complete') ? 'FINAL' : 'UPCOMING';

    // banner
    document.getElementById('tournament-banner').innerHTML = `
      <div>
        <div class="t-name">${lbData.tournamentName || current.name}</div>
        <div class="t-meta">${current.course || ''}</div>
      </div>
      <div class="t-meta" style="text-align:right">${current.date || ''}</div>`;

    // rows
    const tbody = document.getElementById('scoring-tbody');
    tbody.innerHTML = '';
    const players = lbData.players || [];
    players.forEach(p => {
      const owner = ownerOf(p.name);
      const isCut = p.isCut || p.isWD;
      const tot = fmtScore(p.toPar);
      const r1  = fmtScore(p.r1);
      const r2  = fmtScore(p.r2);
      const r3  = fmtScore(p.r3);
      const r4  = fmtScore(p.r4);
      const tr = document.createElement('tr');
      if (owner) tr.classList.add('pool-player');
      if (isCut) tr.classList.add('cut-row');
      tr.innerHTML = `
        <td class="c pos-cell">${p.pos || '–'}</td>
        <td class="player-name${owner?' pool':''}">${p.name}</td>
        <td>${owner ? `<span class="team-pill">${owner}</span>` : ''}</td>
        <td class="c score-cell ${tot.cls}">${tot.txt}</td>
        <td class="c score-cell">${r1.txt}</td>
        <td class="c score-cell">${r2.txt}</td>
        <td class="c score-cell">${r3.txt}</td>
        <td class="c score-cell">${r4.txt}</td>
        <td class="c score-cell">${p.thru || '–'}</td>`;
      tbody.appendChild(tr);
    });

    document.getElementById('last-upd').textContent = 'Updated ' + new Date().toLocaleTimeString();
    loading.style.display = 'none';
    content.style.display = 'block';
  } catch(e) {
    console.error('Live load error', e);
    loading.style.display = 'none';
    errEl.style.display   = 'flex';
  }
}

/* ─── TEAMS TAB ──────────────────────────────── */
function renderTeams() {
  const grid  = document.getElementById('teams-grid');
  const errEl = document.getElementById('teams-error');
  const loadEl= document.getElementById('teams-loading');

  if (!rosters || !rosters.length) {
    loadEl.style.display = 'none';
    errEl.style.display  = 'block';
    return;
  }

  // sort by earnings desc
  const sorted = [...rosters].map(t => {
    const total = t.players.reduce((s,p) => s + (earningsMap[p]||0), 0);
    return { ...t, total };
  }).sort((a,b) => b.total - a.total);

  grid.innerHTML = sorted.map(t => `
    <div class="team-card">
      <div class="team-header">
        <div class="team-owner">${t.owner}</div>
        <div class="team-earnings">${t.total > 0 ? '$' + t.total.toLocaleString() + ' earned · ' + (t.total/100000).toFixed(1) + ' pts' : 'Season earnings loading…'}</div>
      </div>
      <ul class="team-players">
        ${t.players.map(p => {
          const earn = earningsMap[p] || 0;
          return `<li>
            <span>${p}</span>
            ${earn > 0 ? `<span class="player-earn">$${(earn/1000).toFixed(0)}K</span>` : ''}
          </li>`;
        }).join('')}
      </ul>
    </div>`).join('');

  loadEl.style.display = 'none';
  grid.style.display   = 'grid';
}

/* ─── INIT ───────────────────────────────────── */
async function init() {
  await loadRosters();
  loadEarnings().then(() => {
    buildStandings();
    renderTeams();
  });
  loadLive();
  // auto-refresh live every 3 min
  setInterval(loadLive, 3 * 60 * 1000);
}

init();
</script>
</body>
</html>
